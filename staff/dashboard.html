<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JAR Farm — Staff Portal</title>
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;
      background:linear-gradient(145deg,#0a1f10 0%,#1a5c2e 60%,#0f2818 100%);
      display:flex;align-items:center;justify-content:center;padding:1.5rem;color:#fff}
    .card{background:#fff;color:#1a2e1f;width:100%;max-width:440px;padding:2.5rem;
      border-radius:24px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);text-align:center;
      position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
      background:linear-gradient(90deg,#c8961e,#e6b43c,#c8961e)}
    .logo{width:80px;margin-bottom:1.5rem}
    h1{font-family:'Playfair Display',serif;font-size:2rem;margin-bottom:0.5rem;color:#0f2818}
    p.sub{color:#64748b;margin-bottom:2rem;font-size:0.95rem}
    .form-grp{text-align:left;margin-bottom:1.25rem}
    label{display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.4rem;color:#1a5c2e}
    input{width:100%;padding:0.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:12px;
      font-size:1rem;transition:0.2s;outline:none;font-family:inherit}
    input:focus{border-color:#1a5c2e;box-shadow:0 0 0 3px rgba(26,92,46,0.1)}
    .btn{width:100%;padding:0.85rem;background:#1a5c2e;color:#fff;border:none;border-radius:12px;
      font-weight:600;font-size:1rem;cursor:pointer;transition:0.3s;margin-top:0.5rem;
      display:flex;align-items:center;justify-content:center;gap:0.5rem}
    .btn:hover{background:#0f2818;transform:translateY(-1px)}
    .btn:disabled{opacity:0.7;cursor:not-allowed}
    .link{font-size:0.85rem;color:#64748b;margin-top:1.5rem;cursor:pointer;display:inline-block}
    .link:hover{color:#1a5c2e;text-decoration:underline}
    .err-msg{background:#fef2f2;color:#dc2626;padding:0.75rem;border-radius:8px;font-size:0.85rem;
      margin-bottom:1.5rem;display:none;border:1px solid #fee2e2}
    .err-msg.show{display:block}
    .forgot-view,.login-view{display:none}
    .active{display:block}
    .spin{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;
      border-radius:50%;animation:spin 0.6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

  <div class="card">
    <img src="../logo.png" alt="JAR Farm" class="logo" onerror="this.src='https://via.placeholder.com/80?text=JAR'">
    
    <!-- LOGIN VIEW -->
    <div id="vLogin" class="login-view active">
      <h1>Staff Portal</h1>
      <p class="sub">Welcome back! Please login to your account.</p>
      <div id="eLogin" class="err-msg"></div>
      <form onsubmit="handleLogin(event)">
        <div class="form-grp">
          <label>Email Address</label>
          <input type="email" id="lEmail" placeholder="staff@jarfarm.com" required>
        </div>
        <div class="form-grp">
          <label>Password</label>
          <input type="password" id="lPass" placeholder="••••••••" required>
        </div>
        <button type="submit" id="bLogin" class="btn">
          <span id="bLoginT">Login to Dashboard</span>
        </button>
      </form>
      <span class="link" onclick="toggleView('vForgot')">Forgot password?</span>
    </div>

    <!-- FORGOT VIEW -->
    <div id="vForgot" class="forgot-view">
      <h1>Reset Password</h1>
      <p class="sub">Enter your email and we'll send you a link.</p>
      <div id="eForgot" class="err-msg"></div>
      <div id="forgotOK" style="display:none;color:#166534;background:#f0fdf4;padding:0.75rem;border-radius:8px;margin-bottom:1.5rem;font-size:0.85rem"></div>
      <form onsubmit="handleForgot(event)">
        <div class="form-grp">
          <label>Email Address</label>
          <input type="email" id="fEmail" placeholder="staff@jarfarm.com" required>
        </div>
        <button type="submit" id="bForgot" class="btn">
          <span id="bForgotT">Send Reset Link</span>
        </button>
      </form>
      <span class="link" onclick="toggleView('vLogin')">Back to Login</span>
    </div>
  </div>

  <script>
    // ── FIREBASE INIT ────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "", // Key is provided by environment at runtime
      authDomain: "jarfarm-staff.firebaseapp.com",
      projectId: "jarfarm-staff",
      storageBucket: "jarfarm-staff.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ── AUTH LISTENER (Now placed after 'auth' is defined) ───────────
    auth.onAuthStateChanged((user) => {
      // Only redirect if we are SURE the user is logged in
      if (user) {
        // Small delay to ensure the session is stable
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 500);
      }
    });

    // ── NAVIGATION ───────────────────────────────────────────────────
    function toggleView(id) {
      document.querySelectorAll('.login-view, .forgot-view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      clrErr('eLogin'); clrErr('eForgot');
      document.getElementById('forgotOK').style.display='none';
    }

    // ── ACTIONS ──────────────────────────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('lEmail').value;
      const pass = document.getElementById('lPass').value;
      clrErr('eLogin');
      load('bLogin','bLoginT',true,'Logging in...');

      try {
        await auth.signInWithEmailAndPassword(email, pass);
        // onAuthStateChanged will handle the redirect
      } catch (err) {
        let msg = 'Invalid email or password.';
        if(err.code === 'auth/user-disabled') msg = 'This account has been disabled.';
        if(err.code === 'auth/too-many-requests') msg = 'Too many failed attempts. Try again later.';
        showErr('eLogin', msg);
        load('bLogin','bLoginT',false,'Login to Dashboard');
      }
    }

    async function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('fEmail').value;
      clrErr('eForgot');
      document.getElementById('forgotOK').style.display='none';
      load('bForgot','bForgotT',true,'Sending...');

      try {
        await auth.sendPasswordResetEmail(email);
        document.getElementById('forgotOK').style.display='block';
        document.getElementById('forgotOK').textContent='✓ Reset link sent to '+email+'. Check your inbox.';
      } catch(err) {
        showErr('eForgot', err.code==='auth/user-not-found'
          ? 'No account found with this email.' : 'Error sending reset email. Try again.');
      } finally { load('bForgot','bForgotT',false,'Send Reset Link'); }
    }

    async function handleLogout() {
      try {
        await auth.signOut();
        window.localStorage.clear(); 
        window.location.reload(); 
      } catch (err) {
        console.error("Logout failed", err);
      }
    }

    // ── HELPERS ──────────────────────────────────────────────────────
    function showErr(id,msg){ const e=document.getElementById(id); e.textContent=msg; e.classList.add('show'); }
    function clrErr(id){ document.getElementById(id).classList.remove('show'); }
    function load(btnId,txtId,on,label){
      const b=document.getElementById(btnId),t=document.getElementById(txtId);
      b.disabled=on;
      if(on){ t.style.display='none';
        const s=document.createElement('div');s.className='spin';s.id='ls';b.appendChild(s);
      } else {
        const s=document.getElementById('ls');if(s)s.remove();
        t.style.display='';t.textContent=label;
      }
    }
  </script>
</body>
</html>
