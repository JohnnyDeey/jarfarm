<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JAR Farm Dashboard</title>
  <link rel="icon" type="image/png" href="../logo.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#1a5c2e;--green-mid:#2d7a45;--green-light:#e8f5ec;
      --gold:#c8961e;--dark:#0f2818;--text:#2a3d30;--sidebar:240px;
    }
    body{font-family:'DM Sans',sans-serif;background:#f4f6f4;color:var(--text);display:flex;min-height:100vh}

    /* ── SIDEBAR ── */
    .sidebar{
      width:var(--sidebar);min-height:100vh;background:var(--dark);
      display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:50;
      transition:transform .3s;
    }
    .sidebar-brand{padding:1.4rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:.7rem}
    .sidebar-brand img{width:36px;height:36px;object-fit:contain;border-radius:4px}
    .sidebar-brand span{color:#fff;font-weight:600;font-size:.95rem}
    .sidebar-user{padding:.9rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.08)}
    .sidebar-user .name{color:#fff;font-weight:600;font-size:.88rem}
    .sidebar-user .role-tag{
      display:inline-block;margin-top:.3rem;padding:.15rem .6rem;border-radius:20px;
      font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    }
    .role-md    .role-tag{background:rgba(200,150,30,.25);color:#f0c060}
    .role-staff .role-tag{background:rgba(45,122,69,.35);color:#7dd9a0}
    nav.sidebar-nav{flex:1;padding:.8rem 0;overflow-y:auto}
    .nav-section{padding:.5rem 1.2rem .2rem;font-size:.65rem;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.12em;text-transform:uppercase}
    .nav-item{
      display:flex;align-items:center;gap:.75rem;padding:.65rem 1.2rem;
      color:rgba(255,255,255,.65);text-decoration:none;font-size:.88rem;cursor:pointer;
      border:none;background:none;width:100%;text-align:left;transition:background .15s,color .15s;
      border-left:3px solid transparent;
    }
    .nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
    .nav-item.active{background:rgba(255,255,255,.1);color:#fff;border-left-color:var(--gold)}
    .nav-item .icon{font-size:1rem;width:20px;text-align:center}
    .sidebar-bottom{padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,.08)}
    .btn-logout{
      width:100%;padding:.6rem;background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);
      border:1px solid rgba(255,255,255,.12);border-radius:6px;font-family:inherit;
      font-size:.82rem;cursor:pointer;transition:all .2s;
    }
    .btn-logout:hover{background:rgba(220,50,50,.2);color:#ff9999;border-color:rgba(220,50,50,.3)}

    /* ── MAIN ── */
    .main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
    .topbar{
      background:#fff;border-bottom:1px solid #e5ebe5;padding:.85rem 2rem;
      display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;
    }
    .topbar-left{display:flex;align-items:center;gap:.8rem}
    .menu-toggle{display:none;background:none;border:none;cursor:pointer;padding:4px;font-size:1.3rem}
    .page-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--dark)}
    .topbar-right{display:flex;align-items:center;gap:1rem}
    .date-chip{font-size:.78rem;color:#888;background:#f4f4f4;padding:.3rem .7rem;border-radius:20px}

    /* ── PANELS ── */
    .panel{display:none;padding:2rem;animation:fadeIn .2s ease}
    .panel.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* KPI CARDS */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.2rem;margin-bottom:2rem}
    .kpi{background:#fff;border-radius:10px;padding:1.4rem;border:1px solid #e5ebe5}
    .kpi-label{font-size:.75rem;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem}
    .kpi-val{font-size:1.8rem;font-weight:700;color:var(--dark);font-family:'Playfair Display',serif}
    .kpi-sub{font-size:.75rem;color:#aaa;margin-top:.3rem}
    .kpi-green .kpi-val{color:var(--green)}
    .kpi-gold .kpi-val{color:var(--gold)}

    /* SECTION CARDS */
    .card{background:#fff;border-radius:10px;border:1px solid #e5ebe5;margin-bottom:1.5rem}
    .card-head{padding:1.2rem 1.5rem;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
    .card-head h3{font-size:1rem;color:var(--dark);font-weight:600}
    .card-body{padding:1.5rem}
    table{width:100%;border-collapse:collapse;font-size:.88rem}
    th{text-align:left;padding:.6rem .8rem;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#999;border-bottom:2px solid #f0f0f0}
    td{padding:.65rem .8rem;border-bottom:1px solid #f8f8f8;color:var(--text)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafcfa}
    .badge{display:inline-block;padding:.2rem .6rem;border-radius:20px;font-size:.7rem;font-weight:700}
    .badge-green{background:#dcfce7;color:#166534}
    .badge-yellow{background:#fef9c3;color:#854d0e}
    .badge-red{background:#fee2e2;color:#991b1b}
    .badge-blue{background:#dbeafe;color:#1e40af}
    .badge-gold{background:#fef3c7;color:#92400e}

    /* FORM ELEMENTS */
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:.78rem;font-weight:600;color:#555;margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.04em}
    .form-group input,.form-group select,.form-group textarea{
      width:100%;padding:.65rem .9rem;border:1.5px solid #e0e0e0;border-radius:7px;
      font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s;
    }
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--green)}
    .form-group textarea{min-height:90px;resize:vertical}
    .btn{padding:.6rem 1.2rem;border-radius:6px;border:none;font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;transition:opacity .2s}
    .btn-green{background:var(--green);color:#fff}
    .btn-green:hover{opacity:.88}
    .btn-gold{background:var(--gold);color:#fff}
    .btn-gold:hover{opacity:.88}
    .btn-sm{padding:.35rem .8rem;font-size:.78rem}
    .btn-ghost{background:#f4f4f4;color:#444;border:1px solid #e0e0e0}
    .btn-ghost:hover{background:#eee}

    /* SETTINGS / PASSWORD */
    .settings-section{margin-bottom:2rem}
    .settings-section h4{font-size:.9rem;font-weight:700;color:var(--dark);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid var(--green-light)}
    .pw-strength{height:4px;border-radius:2px;margin-top:.4rem;transition:all .3s}
    .pw-hint{font-size:.73rem;color:#999;margin-top:.3rem}

    /* ACTIVITY FEED */
    .feed{list-style:none}
    .feed li{display:flex;gap:.8rem;padding:.7rem 0;border-bottom:1px solid #f0f0f0;align-items:flex-start}
    .feed li:last-child{border-bottom:none}
    .feed-dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-top:.35rem;flex-shrink:0}
    .feed-text{font-size:.85rem;line-height:1.5}
    .feed-time{font-size:.72rem;color:#aaa;margin-top:.1rem}

    /* REPORTS INBOX (MD only) */
    .inbox-item{padding:1rem;border:1px solid #e5ebe5;border-radius:8px;margin-bottom:.8rem;cursor:pointer;transition:border-color .2s}
    .inbox-item:hover{border-color:var(--green)}
    .inbox-item.unread{border-left:3px solid var(--gold)}
    .inbox-from{font-weight:600;font-size:.88rem;color:var(--dark)}
    .inbox-subject{font-size:.82rem;color:#555;margin:.2rem 0}
    .inbox-preview{font-size:.78rem;color:#aaa}
    .inbox-meta{display:flex;justify-content:space-between;align-items:center;margin-top:.4rem}

    /* BROADCAST */
    .broadcast-box{background:linear-gradient(135deg,var(--dark),var(--green));border-radius:10px;padding:1.5rem;color:#fff;margin-bottom:1.5rem}
    .broadcast-box h4{font-size:1rem;margin-bottom:.5rem}
    .broadcast-box p{font-size:.82rem;color:rgba(255,255,255,.7);margin-bottom:1rem}
    .broadcast-box textarea{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;width:100%;padding:.7rem;border-radius:6px;font-family:inherit;font-size:.88rem;min-height:70px;resize:none;outline:none}
    .broadcast-box textarea::placeholder{color:rgba(255,255,255,.45)}

    /* CHAT */
    .chat-wrap{display:flex;flex-direction:column;height:400px}
    .chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.8rem}
    .msg{max-width:80%}
    .msg.mine{align-self:flex-end}
    .msg.other{align-self:flex-start}
    .msg-bubble{padding:.6rem .9rem;border-radius:12px;font-size:.86rem;line-height:1.5}
    .msg.mine .msg-bubble{background:var(--green);color:#fff;border-bottom-right-radius:3px}
    .msg.other .msg-bubble{background:#f0f4f0;color:var(--text);border-bottom-left-radius:3px}
    .msg-meta{font-size:.68rem;color:#aaa;margin-top:.2rem}
    .msg.mine .msg-meta{text-align:right}
    .chat-input-row{display:flex;gap:.6rem;padding:1rem;border-top:1px solid #f0f0f0}
    .chat-input-row input{flex:1;padding:.6rem .9rem;border:1.5px solid #e0e0e0;border-radius:20px;font-family:inherit;font-size:.88rem;outline:none}
    .chat-input-row input:focus{border-color:var(--green)}
    .chat-send{background:var(--green);color:#fff;border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}

    /* OVERLAY */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:1rem}
    .overlay.open{display:flex}
    .modal{background:#fff;border-radius:12px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
    .modal-head{padding:1.2rem 1.5rem;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
    .modal-head h3{font-size:1rem;font-weight:700;color:var(--dark)}
    .modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:#888;line-height:1}
    .modal-body{padding:1.5rem}

    /* MOBILE */
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .main{margin-left:0}
      .menu-toggle{display:block}
      .topbar{padding:.85rem 1rem}
      .panel{padding:1rem}
      .kpi-grid{grid-template-columns:1fr 1fr}
      .form-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <img src="../logo.png" alt="JAR" onerror="this.style.display='none'"/>
    <span>JAR Farm</span>
  </div>
  <div class="sidebar-user" id="sidebarUser">
    <div class="name" id="sidebarName">—</div>
    <span class="role-tag" id="sidebarRoleTag">—</span>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-bottom">
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="page-title" id="topbarTitle">Dashboard</div>
    </div>
    <div class="topbar-right">
      <div class="date-chip" id="dateChip"></div>
    </div>
  </div>

  <div id="panels">
    <!-- panels injected by JS -->
  </div>
</div>

<!-- ADD STOCK MODAL -->
<div class="overlay" id="addStockModal">
  <div class="modal">
    <div class="modal-head"><h3>Add / Update Stock</h3><button class="modal-close" onclick="closeModal('addStockModal')">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Produce Name</label><input id="stockName" placeholder="e.g. French Beans"/></div>
        <div class="form-group"><label>Quantity (kg)</label><input id="stockQty" type="number" placeholder="500"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Category</label>
          <select id="stockCat"><option>Export Grade</option><option>Local Market</option><option>Fruits</option></select>
        </div>
        <div class="form-group"><label>Status</label>
          <select id="stockStatus"><option>In Stock</option><option>Low</option><option>Out of Stock</option></select>
        </div>
      </div>
      <button class="btn btn-green" onclick="saveStock()">Save Stock</button>
    </div>
  </div>
</div>

<!-- LOG ORDER MODAL -->
<div class="overlay" id="addOrderModal">
  <div class="modal">
    <div class="modal-head"><h3>Log New Order</h3><button class="modal-close" onclick="closeModal('addOrderModal')">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Buyer / Customer</label><input id="orderBuyer" placeholder="e.g. Nakumatt Kigali"/></div>
        <div class="form-group"><label>Produce</label><input id="orderProduce" placeholder="e.g. Chili Peppers"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Quantity (kg)</label><input id="orderQty" type="number" placeholder="200"/></div>
        <div class="form-group"><label>Value (RWF)</label><input id="orderValue" type="number" placeholder="200000"/></div>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="orderStatus"><option>Pending</option><option>In Transit</option><option>Delivered</option></select>
      </div>
      <button class="btn btn-green" onclick="saveOrder()">Log Order</button>
    </div>
  </div>
</div>

<!-- ADD FARMER MODAL -->
<div class="overlay" id="addFarmerModal">
  <div class="modal">
    <div class="modal-head"><h3>Add Outgrower Farmer</h3><button class="modal-close" onclick="closeModal('addFarmerModal')">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input id="farmerName" placeholder="Farmer's full name"/></div>
        <div class="form-group"><label>District</label><input id="farmerDistrict" placeholder="e.g. Musanze"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Crops</label><input id="farmerCrops" placeholder="e.g. Chili, Beans"/></div>
        <div class="form-group"><label>Land (acres)</label><input id="farmerLand" type="number" placeholder="2"/></div>
      </div>
      <div class="form-group"><label>Phone</label><input id="farmerPhone" placeholder="+250 7xx xxx xxx"/></div>
      <button class="btn btn-green" onclick="saveFarmer()">Add Farmer</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  SESSION CHECK
// ══════════════════════════════════════════════════════════════════
const role      = sessionStorage.getItem('jar_role');
const userName  = sessionStorage.getItem('jar_name');
const roleLabel = sessionStorage.getItem('jar_roleLabel');

if(!role || !userName){ window.location.href = 'index.html'; }

const isMD      = role === 'md';
const isManager = role === 'manager';

// Date chip
document.getElementById('dateChip').textContent =
  new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});

// Sidebar user info
document.getElementById('sidebarName').textContent = userName;
document.getElementById('sidebarRoleTag').textContent = roleLabel;
document.getElementById('sidebarUser').className =
  'sidebar-user ' + (isMD ? 'role-md' : 'role-staff');

// ══════════════════════════════════════════════════════════════════
//  NAV DEFINITIONS — completely separate for MD vs Staff
// ══════════════════════════════════════════════════════════════════
const MD_NAV = [
  { section: 'Overview' },
  { id:'md-dashboard',  icon:'📊', label:'MD Dashboard' },
  { id:'md-reports',    icon:'📥', label:'Reports Inbox' },
  { id:'md-broadcast',  icon:'📣', label:'Broadcast Message' },
  { section: 'Business' },
  { id:'md-finance',    icon:'💰', label:'Finance Overview' },
  { id:'md-outgrowers', icon:'🌾', label:'Outgrower Network' },
  { id:'md-orders',     icon:'📦', label:'Orders & Sales' },
  { section: 'Settings' },
  { id:'md-settings',   icon:'⚙️', label:'Settings' },
];

const STAFF_NAV = [
  { section: 'My Work' },
  { id:'s-dashboard',   icon:'📊', label:'Operations Dashboard' },
  { id:'s-inventory',   icon:'📦', label:'Inventory' },
  { id:'s-orders',      icon:'🛒', label:'Orders & Sales' },
  { id:'s-outgrowers',  icon:'🌾', label:'Outgrower Network' },
  { section: 'Team' },
  { id:'s-chat',        icon:'💬', label:'Team Chat' },
  { id:'s-reports',     icon:'📋', label:'Submit Reports' },
  { section: 'Account' },
  { id:'s-settings',    icon:'⚙️', label:'Settings' },
];

const nav     = isMD ? MD_NAV    : STAFF_NAV;
const firstId = isMD ? 'md-dashboard' : 's-dashboard';

// ── Build sidebar nav ──
const navEl = document.getElementById('sidebarNav');
nav.forEach(item => {
  if(item.section){
    const s = document.createElement('div');
    s.className = 'nav-section'; s.textContent = item.section;
    navEl.appendChild(s);
  } else {
    const b = document.createElement('button');
    b.className = 'nav-item'; b.dataset.panel = item.id;
    b.innerHTML = `<span class="icon">${item.icon}</span><span>${item.label}</span>`;
    b.onclick = () => switchPanel(item.id, item.label);
    navEl.appendChild(b);
  }
});

// ══════════════════════════════════════════════════════════════════
//  DATA STORE (sessionStorage)
// ══════════════════════════════════════════════════════════════════
function load(k,def){ try{ return JSON.parse(sessionStorage.getItem(k))||def }catch{ return def } }
function save(k,v){ sessionStorage.setItem(k,JSON.stringify(v)) }

const STOCK   = load('jar_stock', [
  {name:'Fresh Chili Peppers',qty:480,cat:'Export Grade',status:'In Stock'},
  {name:'French Beans',       qty:15, cat:'Export Grade',status:'Low'},
  {name:'Avocados',           qty:320,cat:'Export Grade',status:'In Stock'},
  {name:'Irish Potatoes',     qty:0,  cat:'Local Market', status:'Out of Stock'},
  {name:'Pineapples',         qty:95, cat:'Fruits',       status:'In Stock'},
]);
const ORDERS  = load('jar_orders',[
  {buyer:'Nakumatt Kigali',produce:'Chili Peppers',qty:200,value:200000,status:'Delivered',date:'2025-03-24'},
  {buyer:'Carrefour Kigali',produce:'French Beans', qty:150,value:180000,status:'In Transit',date:'2025-03-25'},
]);
const FARMERS = load('jar_farmers',[
  {name:'Jean-Baptiste Nkurunziza',district:'Musanze',crops:'Chili, Beans',land:3,phone:'+250 788 123 456'},
  {name:'Vestine Mukamana',        district:'Nyamagabe',crops:'Avocado',   land:2,phone:'+250 722 987 654'},
]);
const MESSAGES= load('jar_chat',[
  {from:'Operations Manager',text:'Morning! Stock delivered to Nakumatt.',time:'08:14'},
  {from:'Field Staff',       text:'Harvest done — 200kg chili ready.',   time:'09:30'},
]);
const REPORTS = load('jar_reports',[
  {from:'Operations Manager',subject:'Daily Activity Report',preview:'All deliveries completed...',date:'2025-03-25',unread:true},
  {from:'Field Staff',       subject:'Harvest Log — Chili',   preview:'Harvested 200kg from Plot B...',date:'2025-03-24',unread:false},
]);

// ══════════════════════════════════════════════════════════════════
//  PANELS HTML
// ══════════════════════════════════════════════════════════════════
const PANELS = {};

// ── MD DASHBOARD ──
PANELS['md-dashboard'] = ()=>`
<div class="kpi-grid">
  <div class="kpi kpi-green"><div class="kpi-label">Total Stock</div><div class="kpi-val">${STOCK.reduce((a,b)=>a+b.qty,0)} kg</div><div class="kpi-sub">Across all produce</div></div>
  <div class="kpi kpi-gold"><div class="kpi-label">Active Orders</div><div class="kpi-val">${ORDERS.length}</div><div class="kpi-sub">This month</div></div>
  <div class="kpi"><div class="kpi-label">Revenue (Est.)</div><div class="kpi-val">RWF ${(ORDERS.reduce((a,b)=>a+b.value,0)/1000).toFixed(0)}K</div><div class="kpi-sub">All orders</div></div>
  <div class="kpi"><div class="kpi-label">Outgrowers</div><div class="kpi-val">${FARMERS.length}</div><div class="kpi-sub">Contracted farmers</div></div>
</div>
<div class="card">
  <div class="card-head"><h3>📥 Unread Reports from Staff</h3></div>
  <div class="card-body">
    ${REPORTS.filter(r=>r.unread).length===0?'<p style="color:#aaa;font-size:.85rem">No unread reports.</p>':
      REPORTS.filter(r=>r.unread).map(r=>`
        <div class="inbox-item unread">
          <div class="inbox-from">${r.from}</div>
          <div class="inbox-subject">${r.subject}</div>
          <div class="inbox-preview">${r.preview}</div>
          <div class="inbox-meta"><span class="badge badge-yellow">Unread</span><span style="font-size:.72rem;color:#aaa">${r.date}</span></div>
        </div>`).join('')}
  </div>
</div>
<div class="card">

//  PANEL SWITCHING
// ══════════════════════════════════════════════════════════════════
let currentPanel = '';
function switchPanel(id, label){
  currentPanel = id;
  document.getElementById('panels').innerHTML =
    `<div class="panel active">${PANELS[id]()}</div>`;
  document.getElementById('topbarTitle').textContent = label||id;
  document.querySelectorAll('.nav-item').forEach(b=>{
    b.classList.toggle('active', b.dataset.panel===id);
  });
  // close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  // scroll chat to bottom
  if(id==='s-chat'){
    setTimeout(()=>{
      const c=document.getElementById('chatMessages');
      if(c) c.scrollTop=c.scrollHeight;
    },50);
  }
}

// ══════════════════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════════════════
function saveStock(){
  const name=document.getElementById('stockName').value.trim();
  const qty=parseInt(document.getElementById('stockQty').value)||0;
  const cat=document.getElementById('stockCat').value;
  const status=document.getElementById('stockStatus').value;
  if(!name){ alert('Please enter produce name'); return; }
  STOCK.push({name,qty,cat,status}); save('jar_stock',STOCK);
  closeModal('addStockModal');
  switchPanel(currentPanel);
}

function saveOrder(){
  const buyer=document.getElementById('orderBuyer').value.trim();
  const produce=document.getElementById('orderProduce').value.trim();
  const qty=parseInt(document.getElementById('orderQty').value)||0;
  const value=parseInt(document.getElementById('orderValue').value)||0;
  const status=document.getElementById('orderStatus').value;
  if(!buyer||!produce){ alert('Please fill in buyer and produce'); return; }
  const date=new Date().toISOString().slice(0,10);
  ORDERS.push({buyer,produce,qty,value,status,date}); save('jar_orders',ORDERS);
  closeModal('addOrderModal');
  switchPanel(currentPanel);
}

function saveFarmer(){
  const name=document.getElementById('farmerName').value.trim();
  const district=document.getElementById('farmerDistrict').value.trim();
  const crops=document.getElementById('farmerCrops').value.trim();
  const land=parseFloat(document.getElementById('farmerLand').value)||0;
  const phone=document.getElementById('farmerPhone').value.trim();
  if(!name){ alert('Please enter farmer name'); return; }
  FARMERS.push({name,district,crops,land,phone}); save('jar_farmers',FARMERS);
  closeModal('addFarmerModal');
  switchPanel(currentPanel);
}

function sendChat(){
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim(); if(!text) return;
  const now=new Date(); const time=now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
  MESSAGES.push({from:userName,text,time}); save('jar_chat',MESSAGES);
  inp.value='';
  const c=document.getElementById('chatMessages');
  const div=document.createElement('div'); div.className='msg mine';
  div.innerHTML=`<div class="msg-bubble">${text}</div><div class="msg-meta">You · ${time}</div>`;
  c.appendChild(div); c.scrollTop=c.scrollHeight;
}

function sendBroadcast(){
  const text=document.getElementById('broadcastText').value.trim();
  if(!text){ alert('Please type a message first'); return; }
  const now=new Date(); const time=now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
  MESSAGES.push({from:'📣 MD Broadcast',text,time}); save('jar_chat',MESSAGES);
  document.getElementById('broadcastText').value='';
  alert('Broadcast sent to all staff! ✓');
}

function submitReport(){
  const type=document.getElementById('reportType').value;
  const body=document.getElementById('reportBody').value.trim();
  if(!body){ document.getElementById('reportMsg').innerHTML='<span style="color:#dc2626">Please write your report before submitting.</span>'; return; }
  const date=new Date().toISOString().slice(0,10);
  REPORTS.unshift({from:userName,subject:type,preview:body.slice(0,60)+'…',date,unread:true});
  save('jar_reports',REPORTS);
  document.getElementById('reportMsg').innerHTML='<span style="color:#166534">✓ Report submitted successfully.</span>';
  document.getElementById('reportBody').value='';
  const mr=document.getElementById('myReports');
  if(mr){ mr.innerHTML=`<div class="inbox-item"><div class="inbox-from">${type}</div><div class="inbox-subject">${date}</div><div class="inbox-preview">${body.slice(0,80)}</div></div>`; }
}

function emailReport(){
  const type=document.getElementById('reportType').value;
  const body=document.getElementById('reportBody').value.trim();
  const subject=encodeURIComponent(`JAR Farm Report: ${type} — ${userName}`);
  const bodyEnc=encodeURIComponent(`From: ${userName} (${roleLabel})\nDate: ${new Date().toDateString()}\nType: ${type}\n\n${body||'(No details entered)'}`);
  window.open(`mailto:johndamilola328@gmail.com?subject=${subject}&body=${bodyEnc}`);
}

function checkStrength(pw){
  const bar=document.getElementById('pwBar'); const hint=document.getElementById('pwHint');
  if(!bar) return;
  let score=0;
  if(pw.length>=8) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  const colors=['#ef4444','#f97316','#eab308','#22c55e'];
  const labels=['Too short','Weak','Good','Strong'];
  bar.style.width=(score/4*100)+'%'; bar.style.background=colors[Math.max(0,score-1)];
  hint.textContent=pw.length?labels[Math.max(0,score-1)]:'';
}

function changePassword(){
  const oldPw=document.getElementById('pwOld')?.value;
  const newPw=document.getElementById('pwNew')?.value;
  const conf =document.getElementById('pwConf')?.value;
  const msg  =document.getElementById('pwMsg');
  if(!oldPw||!newPw||!conf){ msg.innerHTML='<span style="color:#dc2626">Please fill all fields.</span>'; return; }
  if(newPw!==conf){ msg.innerHTML='<span style="color:#dc2626">New passwords do not match.</span>'; return; }
  if(newPw.length<6){ msg.innerHTML='<span style="color:#dc2626">Password must be at least 6 characters.</span>'; return; }
  // Store new password in sessionStorage (for this session)
  sessionStorage.setItem('jar_pw_'+role, newPw);
  msg.innerHTML='<span style="color:#166534">✓ Password updated for this session. Ask your administrator to update the code permanently.</span>';
}
